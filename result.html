<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>추천 결과 — 오늘의 씬</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    :root {
      --bg: #fdfcfb; --bg2: #f5f4f1; --ink-deep: #0a0a0a;
      --accent: #111; --accent-2: #444; --accent-glow: rgba(0,0,0,.08);
      --cream: #fff; --paper: #fdfcfb;
      --ink: #111;
      --border: rgba(17,17,17,.12); --border-strong: rgba(17,17,17,.3);
      --w95: rgba(17,17,17,.95); --w65: rgba(17,17,17,.65);
      --w40: rgba(17,17,17,.4); --w15: rgba(17,17,17,.08);
      --r: 2px;
      --fp: 'Pretendard', -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box }
    html { scroll-behavior: smooth }
    body { background: var(--bg); color: var(--w95); font-family: var(--fp); -webkit-font-smoothing: antialiased; overflow-x: hidden }

    nav {
      position: sticky; top: 0; z-index: 100; height: 66px; padding: 0 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(253,252,251,.9); border-bottom: 1px solid var(--border); backdrop-filter: blur(18px);
    }
    .nav-logo { font-size: 1.15rem; font-weight: 700; color: var(--ink); text-decoration: none; letter-spacing: -.01em; display: flex; align-items: center; gap: .55rem }
    .nav-logo em { font-style: normal; font-weight: 400; opacity: .6 }
    .nav-links { display: flex; gap: 2rem; list-style: none; position: absolute; left: 50%; transform: translateX(-50%); }
    .nav-links a { font-size: .80rem; font-weight: 500; color: var(--w65); text-decoration: none; letter-spacing: .08em; text-transform: uppercase; transition: color .2s }
    .nav-links a:hover, .nav-links a.active { color: var(--accent) }
    .nav-back { display: inline-flex; align-items: center; gap: .4rem; padding: .45rem 1rem; background: transparent; border: 1px solid var(--border-strong); border-radius: 40px; color: var(--accent); font-size: .7rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: all .25s }
    .nav-back:hover { background: var(--accent); color: var(--cream) }

    /* HERO BAND */
    .hero-band {
      padding: 6.5rem 3.5rem 5.5rem;
      background: var(--bg);
      transition: background .8s; position: relative; overflow: hidden; text-align: center;
    }
    .band-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
    .band-mood {
      display: inline-flex; align-items: center; gap: .6rem;
      margin-bottom: 1.5rem; font-size: .65rem; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; color: var(--w65);
      position: relative;
    }
    .band-title { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 600; line-height: 1.1; letter-spacing: -.03em; color: var(--ink); margin-bottom: 1.2rem; text-wrap: balance }
    .band-title em { font-style: normal; font-weight: 400; color: var(--w65) }
    .band-sub   { font-size: 1.05rem; color: var(--w65); font-weight: 400; line-height: 1.6; max-width: 500px }

    /* CARDS */
    .cards-section { max-width: 900px; margin: 0 auto; padding: 4rem 3.5rem }
    .cards-wrap { display: flex; flex-direction: column; gap: 2.5rem }
    .card {
      display: grid; grid-template-columns: 140px 1fr auto; gap: 2rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r); padding: 1.5rem;
      transition: border-color .3s, transform .3s, box-shadow .3s;
      animation: fadeUp .8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .card:hover { border-color: var(--border-strong); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.04) }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }

    .poster-wrap { position: relative; width: 140px; flex-shrink: 0 }
    .poster-num {
      position: absolute; top: -10px; left: -10px; z-index: 2;
      width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 600;
    }
    .poster { width: 140px; aspect-ratio: 2/3; border-radius: 2px; background: var(--border); background-size: cover; background-position: center; border: 1px solid var(--border) }

    .card-body { min-width: 0; padding-top: .2rem }
    .card-n {
      font-size: .6rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
      color: var(--w40); margin-bottom: .8rem;
    }
    .card-title { font-size: 1.8rem; font-weight: 600; line-height: 1.1; letter-spacing: -.03em; color: var(--ink); margin-bottom: .6rem; cursor: pointer; transition: color .2s }
    .card-title:hover { color: var(--accent-2) }
    .card-meta { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; font-size: .75rem; color: var(--w65); margin-bottom: 1rem; letter-spacing: .05em; }
    .card-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong) }
    .card-genre { padding: .2rem .5rem; background: var(--bg2); color: var(--accent-2); border-radius: var(--r); font-size: .65rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase }
    .card-desc { font-size: .9rem; line-height: 1.6; color: var(--w65); margin-bottom: 1.2rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-weight: 400 }
    .card-why { display: block; font-size: .85rem; font-weight: 400; color: var(--accent-2); border-top: 1px solid var(--border); padding-top: .8rem; max-width: 560px; line-height: 1.6 }
    .card-why::before { content: "“"; font-size: 1.2rem; line-height: 1; font-family: serif; margin-right: .25rem; color: var(--w40); vertical-align: bottom }
    .card-why::after { content: "”"; font-size: 1.2rem; line-height: 1; font-family: serif; margin-left: .15rem; color: var(--w40); vertical-align: bottom }

    .card-side { display: flex; flex-direction: column; align-items: flex-end; gap: 1rem; padding-top: .2rem; min-width: 110px }
    .card-score { font-size: 2rem; font-weight: 600; color: var(--accent); line-height: 1; text-align: right; letter-spacing: -.03em }
    .card-score small { font-size: .6rem; font-weight: 400; color: var(--w40); letter-spacing: .05em }
    .card-score-lbl { font-size: .6rem; font-weight: 500; color: var(--w40); letter-spacing: .1em; text-transform: uppercase; text-align: right; margin-top: .2rem }
    .btn-sm { padding: .65rem 1.2rem; background: transparent; color: var(--accent); border: 1px solid var(--border-strong); border-radius: 40px; font-size: .65rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s; white-space: nowrap }
    .btn-sm:hover { background: var(--accent); color: var(--cream) }

    /* RESET */
    .reset { background: var(--bg); border-top: 1px solid var(--border); padding: 5rem 3.5rem; text-align: center }
    .reset-inner { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1.5rem }
    .reset h3 { font-size: 2rem; font-weight: 600; line-height: 1.1; letter-spacing: -.03em; margin-bottom: .5rem; color: var(--ink) }
    .reset h3 em { font-style: normal; font-weight: 400; color: var(--w65) }
    .reset p { font-size: .95rem; color: var(--w65); line-height: 1.6; font-weight: 400 }
    .btn-lg { padding: 1rem 2.2rem; background: var(--accent); color: var(--cream); border: none; border-radius: 40px; font-size: .75rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; cursor: pointer; transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; gap: .5rem }
    .btn-lg:hover { background: var(--accent-2) }

    footer { background: var(--bg2); padding: 0; border-top: 1px solid var(--border) }
    .footer-row { display: flex; align-items: center; justify-content: space-between; padding: 2rem 3.5rem; gap: 1rem; flex-wrap: wrap }
    .foot-logo { font-size: 1rem; font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: -.01em; display: flex; align-items: center; gap: .5rem }
    .foot-logo em { font-style: normal; font-weight: 400; opacity: .6 }
    .foot-links { display: flex; gap: 2rem }
    .foot-links a { font-size: .75rem; font-weight: 500; color: var(--w40); text-decoration: none; letter-spacing: .08em; text-transform: uppercase; transition: color .2s }
    .foot-links a:hover { color: var(--accent) }

    .loading-state { max-width: 900px; margin: 3rem auto; text-align: center; padding: 4rem 1rem; color: var(--w65); font-size: .8rem; font-weight: 400; letter-spacing: .1em; text-transform: uppercase }
    .loading-spinner { width: 34px; height: 34px; margin: 0 auto 1.4rem; border: 1px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite }
    @keyframes spin { to { transform: rotate(360deg) } }
    .error-state { max-width: 900px; margin: 3rem auto; text-align: center; padding: 3rem 1rem; color: #884444; background: rgba(136,68,68,.05); border: 1px solid rgba(136,68,68,.2); border-radius: var(--r); font-size: .9rem; line-height: 1.6 }

    @media(max-width:700px) {
      nav{padding:0 1.2rem} .nav-links{display:none}
      .hero-band, .cards-section, .reset { padding-left: 1.2rem; padding-right: 1.2rem }
      .card { grid-template-columns: 90px 1fr; gap: 1.1rem }
      .poster-wrap, .poster { width: 90px }
      .card-side { flex-direction: row; flex-wrap: wrap; grid-column: 1/-1; justify-content: flex-start; align-items: center }
      .card-score { display: none }
      .footer-row { padding: 1.3rem 1.2rem }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Today's <em>Scene</em></a>
  <ul class="nav-links">
    <li><a href="index.html">홈 (Home)</a></li>
    <li><a href="about.html">소개 (About)</a></li>
  </ul>
  <div class="nav-right">
    <button class="search-btn" onclick="openSearch()" title="영화 검색">⌕</button>
    <a href="index.html" class="nav-back">← Reselect</a>
  </div>
</nav>

<div class="hero-band" id="heroBand">
  <div class="band-inner">
    <p class="band-mood" id="bandMood">Melancholy</p>
    <h1 class="band-title" id="bandTitle">Curated for <em>Mood</em></h1>
    <p class="band-sub">오늘 당신의 감성에 맞춘 3편의 추천 작품입니다.</p>
  </div>
</div>

<section class="cards-section">
  <div class="cards-wrap" id="cardsWrap">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Now Loading…</p>
    </div>
  </div>
</section>

<div class="reset">
  <div class="reset-inner">
    <h3>Want a different <em>vibe?</em></h3>
    <p>지금의 감정과 맞지 않나요? 새로운 무드를 선택하고 다른 작품들을 만나보세요.</p>
    <a href="index.html" class="btn-lg">무드 다시 선택하기 (Change Mood)</a>
  </div>
</div>

<footer>
  <div class="footer-row">
    <a href="index.html" class="foot-logo">Today's <em>Scene</em></a>
    <div class="foot-links">
      <a href="about.html">About</a>
      <a href="index.html">Curated</a>
    </div>
  </div>
</footer>

<script src="js/movies-data.js"></script>
<script src="js/common.js"></script>
<script>
function goDetail(movieId) {
  sessionStorage.setItem('movieId', movieId);
  window.location.href = 'detail.html';
}
async function loadResults() {
  const mood = sessionStorage.getItem('mood') || 'melancholy';
  const pick = getTodaysPick(mood);
  if (!pick) {
    document.getElementById('cardsWrap').innerHTML = '<div class="error-state">무드 정보를 찾을 수 없어요. 홈에서 다시 선택해주세요.</div>';
    return;
  }
  const titleMap = {
    melancholy: "Melancholy",
    excited: "Thrilling",
    romantic: "Romantic",
    dark: "Tense",
    cozy: "Cozy",
    wonder: "Epic",
    funny: "Lighthearted",
    thoughtful: "Thoughtful"
  };

  const bgMap = {
    melancholy: '#e8f0fe',
    excited: '#ffe0bf',
    romantic: '#fde2ec',
    dark: '#f2e6ff',
    cozy: '#ffebb3',
    wonder: '#e1f4fa',
    funny: '#e2fce9',
    thoughtful: '#eef2f6'
  };

  const mt = titleMap[mood] || "Features";
  document.getElementById('bandMood').textContent = mt;
  document.getElementById('bandTitle').innerHTML = `Curated for <em>${mt}</em>`;
  document.getElementById('heroBand').style.background = bgMap[mood] || 'var(--bg)';
  sessionStorage.setItem('currentPickIds', JSON.stringify(pick.movies));
  const wrap = document.getElementById('cardsWrap');
  const data = { movies: pick.movies, reasons: pick.reasons };
  try {
    const movies = await Promise.all(data.movies.map(id => fetchMovie(id)));
    wrap.innerHTML = movies.map((m, i) => {
      const poster = posterUrl(m.poster_path);
      const year   = m.release_date ? m.release_date.slice(0, 4) : '—';
      const rating = m.vote_average ? m.vote_average.toFixed(1) : '—';
      const genre  = getGenres(m.genres) || '드라마';
      const overview = m.overview || '줄거리 정보가 없습니다.';
      const why    = data.reasons[i] || '';
      return `
        <div class="card" style="animation-delay: ${i * 0.3 + 0.2}s">
          <div class="poster-wrap">
            <div class="poster" style="background-image: url('${poster}')"></div>
            <div class="poster-num">${i + 1}</div>
          </div>
          <div class="card-body">
            <p class="card-n">Feature ${String(i+1).padStart(2,'0')}</p>
            <h3 class="card-title" onclick="goDetail(${m.id})">${m.title}</h3>
            <div class="card-meta">
              <span>${year}</span><span class="dot"></span>
              <span class="card-genre">${genre}</span>
            </div>
            <p class="card-desc">${overview}</p>
            <p class="card-why">${why}</p>
          </div>
          <div class="card-side">
            <div>
              <div class="card-score">${rating}<small> /10</small></div>
              <div class="card-score-lbl">TMDB Score</div>
            </div>
            <button class="btn-sm" onclick="goDetail(${m.id})">상세보기 (Details)</button>
          </div>
        </div>`;
    }).join('');
    requestAnimationFrame(() => {
      document.querySelectorAll('.card').forEach(c => c.classList.add('show'));
    });
  } catch (err) {
    wrap.innerHTML = `<div class="error-state">영화 정보를 불러오지 못했습니다.<br><span style="font-size:.8rem;opacity:.7">API 키 또는 네트워크 상태를 확인해주세요.</span></div>`;
  }
}
loadResults();
</script>
</body>
</html>
